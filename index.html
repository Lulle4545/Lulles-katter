<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roliga Kattbilder 🐱</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fefefe;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff6600;
        }
        img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        button {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>
    <h1>Roliga Kattbilder 🐱</h1>
    <img id="catImage" src="" alt="En söt katt">
    <br>
    <button onclick="getRandomCat()">Visa ny katt!</button>

    <script>
        async function getRandomCat() {
            try {
                const response = await fetch('https://api.thecatapi.com/v1/images/search');
                const data = await response.json();
                document.getElementById('catImage').src = data[0].url;
            } catch (error) {
                alert('Kunde inte hämta kattbild. Försök igen!');
                console.error(error);
            }
        }

        // Visa en kattbild direkt när sidan laddas
        getRandomCat();
    </script>
</body>
</html>
